<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MedQuality - Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="split-container">

    <!-- Left blue panel -->
    <div class="split-left">
      <svg class="brand-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="36" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
        <path d="M18 40 L26 40 L30 28 L36 52 L40 36 L44 40 L62 40"
          fill="none" stroke="#ffffff" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1 class="brand-name">MedQuality</h1>
      <p class="brand-tagline">Online Testing and Monitoring<br>of Quality of Medicines</p>
    </div>

    <!-- Right white form panel -->
    <div class="split-right">
      <div class="form-box">
        <h2 class="form-title">Create account</h2>
        <p class="form-subtitle">Sign up to get started</p>

        <form id="signupForm">
          <label>Username</label>
          <input type="text" id="signupUsername" placeholder="Enter your username" required>

          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Enter your password" required>

          <label>Role</label>
          <select id="signupRole">
            <option value="Lab Technician">Lab Technician</option>
            <option value="Admin">Admin</option>
            <option value="Pharmacist">Pharmacist</option>
            <option value="Quality Manager">Quality Manager</option>
            <option value="Supervisor">Supervisor</option>
            <option value="Auditor">Auditor</option>
          </select>

          <button type="submit" class="btn-primary">Create account</button>

          <p class="form-link">
            Already have an account? <a href="index.html">Sign in</a>
          </p>
        </form>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
