<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MedQuality - Medicines</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
</head>
<body class="light-page">

  <!-- Hamburger button -->
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Overlay -->
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <a href="dashboard.html" class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="36" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
          <path d="M18 40 L26 40 L30 28 L36 52 L40 36 L44 40 L62 40"
            fill="none" stroke="#ffffff" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>MedQuality</span>
      </a>

      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="medicines.html" class="active">
          <span class="nav-icon">💊</span> Medicines
        </a>
        <a href="consumables.html">
          <span class="nav-icon">🧪</span> Consumables
        </a>
        <a href="test-results.html">
          <span class="nav-icon">📋</span> Test Results
        </a>
        <a href="alerts.html">
          <span class="nav-icon">🔔</span> Alerts
        </a>
        <a href="report.html">
          <span class="nav-icon">📄</span> Report
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="sidebar-user">
          <p>Logged in as</p>
          <span id="welcomeUser"></span>
        </div>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </aside>

    <!-- Main content -->
    <div class="main-content">
      <div class="page-container">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
          <p class="page-title" style="margin-bottom:0;">Medicines</p>
          <button onclick="showAddForm()" class="btn-primary" style="width:auto; padding:10px 20px; margin-top:0;">
            + Add Medicine
          </button>
        </div>

        <!-- Add Medicine Form -->
        <div id="addForm" class="card" style="display:none; margin-bottom:24px;" data-aos="fade-down">
          <p style="font-size:15px; font-weight:600; color:#15803d; margin-bottom:16px;">Add new medicine</p>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div>
              <label>Medicine name</label>
              <input type="text" id="medName" placeholder="e.g. Paracetamol">
            </div>
            <div>
              <label>Batch number</label>
              <input type="text" id="medBatch" placeholder="e.g. B001">
            </div>
            <div>
              <label>Manufacturer</label>
              <input type="text" id="medManufacturer" placeholder="e.g. Sun Pharma">
            </div>
            <div>
              <label>Expiry date</label>
              <input type="date" id="medExpiry">
            </div>
          </div>
          <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="addMedicine()" class="btn-primary" style="width:auto; padding:10px 24px; margin-top:0;">Save medicine</button>
            <button onclick="hideAddForm()" class="btn-danger" style="padding:10px 24px;">Cancel</button>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" style="margin-bottom:24px;">
          <div class="stat-card" data-aos="fade-up" data-aos-delay="0">
            <p class="stat-label">Total medicines</p>
            <p class="stat-value" id="totalMedicines">0</p>
          </div>
          <div class="stat-card" data-aos="fade-up" data-aos-delay="100">
            <p class="stat-label">Expiring soon</p>
            <p class="stat-value" id="expiringSoon" style="color:#854d0e;">0</p>
          </div>
          <div class="stat-card" data-aos="fade-up" data-aos-delay="200">
            <p class="stat-label">Expired</p>
            <p class="stat-value" id="expired" style="color:#991b1b;">0</p>
          </div>
          <div class="stat-card" data-aos="fade-up" data-aos-delay="300">
            <p class="stat-label">Active</p>
            <p class="stat-value" id="active" style="color:#166534;">0</p>
          </div>
        </div>

        <!-- Medicines table -->
        <div class="card" data-aos="fade-up">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Batch number</th>
                <th>Manufacturer</th>
                <th>Expiry date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="medicinesTable">
              <tr>
                <td colspan="6" style="text-align:center; color:#94a3b8;">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="medicines.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }
  </script>
</body>
</html>
