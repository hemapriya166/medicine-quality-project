<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MedQuality - Alerts</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
</head>
<body class="light-page">

  <!-- Hamburger button -->
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">

    <span></span>
    <span></span>

  <!-- Overlay -->

  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

          <path d="M18 40 L26 40 L30 28 L36 52 L40 36 L44 40 L62 40"
            fill="none" stroke="#ffffff" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>MedQuality</span>
      </a>

      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
        <a href="medicines.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.5 20H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H20a2 2 0 0 1 2 2v3"/>
            <circle cx="18" cy="18" r="3"/><path d="M18 15v3h3"/>
          </svg>
          Medicines
        </a>
        <a href="consumables.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/>
            <path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/>
            <path d="M12 3v6"/>
          </svg>
          Consumables
        </a>
        <a href="test-results.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
          Test Results
        </a>
        <a href="alerts.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          Alerts
        </a>
        <a href="report.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
          Report
        </a>
        <a href="about.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          About
        </a>
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-user">
          <p>Logged in as</p>
          <span id="welcomeUser"></span>
        </div>
        <button onclick="logout()" style="display:flex; align-items:center; gap:8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
        <button class="dark-mode-btn" onclick="toggleDarkMode()" id="themeBtn">
          <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <span id="themeText">Dark mode</span>
        </button> 
      </div>
    </aside>

    <!-- Main content -->
    <div class="main-content">
      <div class="page-container">

        <p class="page-title">Alerts</p>

        <!-- Stats -->
        <div class="stats-grid" style="margin-bottom:24px;">
          <div class="stat-card" data-aos="fade-up" data-aos-delay="0">
            <p class="stat-label">Total alerts</p>
            <p class="stat-value" id="totalAlerts">0</p>
          </div>
          <div class="stat-card" data-aos="fade-up" data-aos-delay="100">
            <p class="stat-label">Critical</p>
            <p class="stat-value" id="criticalCount" style="color:#991b1b;">0</p>
          </div>
          <div class="stat-card" data-aos="fade-up" data-aos-delay="200">
            <p class="stat-label">Warning</p>
            <p class="stat-value" id="warningCount" style="color:#854d0e;">0</p>
          </div>
          <div class="stat-card" data-aos="fade-up" data-aos-delay="300">
            <p class="stat-label">Resolved</p>
            <p class="stat-value" id="resolvedCount" style="color:#166534;">0</p>
          </div>
        </div>

        <!-- Filter buttons -->
        <div style="display:flex; gap:10px; margin-bottom:20px;">
          <button onclick="filterAlerts('all')" id="btnAll"
            style="padding:8px 20px; border-radius:8px; border:2px solid #0c447c;
            background:#0c447c; color:white; font-weight:600; cursor:pointer; font-size:13px;">
            All
          </button>
          <button onclick="filterAlerts('Critical')" id="btnCritical"
            style="padding:8px 20px; border-radius:8px; border:2px solid #991b1b;
            background:white; color:#991b1b; font-weight:600; cursor:pointer; font-size:13px;">
            Critical
          </button>
          <button onclick="filterAlerts('Warning')" id="btnWarning"
            style="padding:8px 20px; border-radius:8px; border:2px solid #854d0e;
            background:white; color:#854d0e; font-weight:600; cursor:pointer; font-size:13px;">
            Warning
          </button>
          <button onclick="filterAlerts('Resolved')" id="btnResolved"
            style="padding:8px 20px; border-radius:8px; border:2px solid #166534;
            background:white; color:#166534; font-weight:600; cursor:pointer; font-size:13px;">
            Resolved
          </button>
        </div>

        <!-- Alerts list -->
        <div id="alertsList" data-aos="fade-up">
          <p style="color:#94a3b8; font-size:13px;">Loading...</p>
        </div>

      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="alerts.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }
    // Dark mode
function toggleDarkMode() {
  const isDark = document.body.classList.toggle('dark-mode');
  localStorage.setItem('darkMode', isDark);
  updateThemeBtn(isDark);
}

function updateThemeBtn(isDark) {
  document.getElementById('themeText').textContent = isDark ? 'Light mode' : 'Dark mode';
  document.getElementById('themeIcon').innerHTML = isDark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

// Apply saved theme on load
(function() {
  const isDark = localStorage.getItem('darkMode') === 'true';
  if (isDark) {
    document.body.classList.add('dark-mode');
    updateThemeBtn(true);
  }
})();
  </script>
</body>
</html>
